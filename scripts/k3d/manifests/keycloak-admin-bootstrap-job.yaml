# One-shot Job that creates dnd-notes-keycloak-admin in the dnd-notes tenant
# realm using the bootstrap-admin credentials from keycloak-bootstrap-env.
# The tenant realm is where the dnd-notes-keycloak-admin service-account client
# lives, mirroring the prod topology (deploy/k3s/base/keycloak/realm-config.yaml).
#
# Run once per cluster between keycloak-ready and control-plane startup:
#   kubectl delete job -n dnd-notes-platform keycloak-admin-bootstrap --ignore-not-found
#   kubectl apply  -f scripts/k3d/manifests/keycloak-admin-bootstrap-job.yaml
#   kubectl wait  --for=condition=complete --timeout=120s \
#                  -n dnd-notes-platform job/keycloak-admin-bootstrap
#
# Idempotent: if dnd-notes-keycloak-admin already exists (e.g. fresh cluster with
# realm import) the Job confirms it and exits 0. On an existing cluster where the
# realm was imported before this client was added, the Job creates it.
#
# The bootstrap credentials NEVER enter the long-running control-plane process.
# The control-plane authenticates exclusively via client_credentials against the
# seeded dnd-notes-keycloak-admin client.
#
# Hosted-reference: annotate with
#   helm.sh/hook: pre-install,pre-upgrade
#   helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
# and source the bootstrap credentials from the equivalent hosted Secret.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-admin-bootstrap
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: keycloak-admin-bootstrap
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: dnd-notes
spec:
  # Allow 6 retries in case Keycloak is slow to finish initialising.
  backoffLimit: 6
  # Fail hard after 5 minutes — never block cluster startup silently.
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: alpine:3.20
          # Bootstrap credentials are read from the existing platform Secret.
          # They are used only to acquire a short-lived master-realm admin token
          # and are never written to logs.
          envFrom:
            - secretRef:
                name: keycloak-bootstrap-env
          env:
            - name: KC_BASE_URL
              value: "http://platform-keycloak.dnd-notes-platform.svc.cluster.local:8080"
            - name: KC_REALM
              value: "dnd-notes"
            - name: ADMIN_CLIENT_ID
              value: "dnd-notes-keycloak-admin"
            - name: ADMIN_CLIENT_SECRET
              value: "dev-admin-client-secret"
          command:
            - /bin/sh
            - -eu
            - -c
            - |
              apk add --no-cache curl jq >/dev/null

              echo "[bootstrap] Waiting for realm ${KC_REALM} to be available..."
              deadline=$(( $(date +%s) + 60 ))
              while true; do
                status=$(curl -s -o /dev/null -w '%{http_code}' \
                  "${KC_BASE_URL}/realms/${KC_REALM}")
                if [ "${status}" = "200" ]; then
                  echo "[bootstrap] Realm ${KC_REALM} is ready."
                  break
                fi
                if [ "$(date +%s)" -ge "${deadline}" ]; then
                  echo "[bootstrap] ERROR: Timed out waiting for realm ${KC_REALM}." >&2
                  exit 1
                fi
                sleep 3
              done

              echo "[bootstrap] Acquiring master-realm admin token..."
              token_json=$(curl -s -f \
                -d "grant_type=password" \
                -d "client_id=admin-cli" \
                --data-urlencode "username=${KC_BOOTSTRAP_ADMIN_USERNAME}" \
                --data-urlencode "password=${KC_BOOTSTRAP_ADMIN_PASSWORD}" \
                "${KC_BASE_URL}/realms/master/protocol/openid-connect/token")
              TOKEN=$(echo "${token_json}" | jq -r '.access_token')
              if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
                echo "[bootstrap] ERROR: Failed to acquire admin token." >&2
                exit 1
              fi
              echo "[bootstrap] Admin token acquired."

              echo "[bootstrap] Checking whether ${ADMIN_CLIENT_ID} already exists..."
              clients_json=$(curl -s -f \
                -H "Authorization: Bearer ${TOKEN}" \
                "${KC_BASE_URL}/admin/realms/${KC_REALM}/clients?clientId=${ADMIN_CLIENT_ID}")
              client_count=$(echo "${clients_json}" | jq 'length')

              if [ "${client_count}" -gt "0" ]; then
                echo "[bootstrap] Client ${ADMIN_CLIENT_ID} already exists — skipping create."
              else
                echo "[bootstrap] Creating client ${ADMIN_CLIENT_ID}..."
                http_code=$(curl -s -o /dev/null -w '%{http_code}' \
                  -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"clientId\": \"${ADMIN_CLIENT_ID}\",
                    \"enabled\": true,
                    \"publicClient\": false,
                    \"standardFlowEnabled\": false,
                    \"implicitFlowEnabled\": false,
                    \"directAccessGrantsEnabled\": false,
                    \"serviceAccountsEnabled\": true,
                    \"clientAuthenticatorType\": \"client-secret\",
                    \"secret\": \"${ADMIN_CLIENT_SECRET}\"
                  }" \
                  "${KC_BASE_URL}/admin/realms/${KC_REALM}/clients")
                if [ "${http_code}" != "201" ]; then
                  echo "[bootstrap] ERROR: POST /clients returned HTTP ${http_code}." >&2
                  exit 1
                fi
                echo "[bootstrap] Client ${ADMIN_CLIENT_ID} created (HTTP 201)."

                # Re-fetch to get the Keycloak-assigned internal id.
                clients_json=$(curl -s -f \
                  -H "Authorization: Bearer ${TOKEN}" \
                  "${KC_BASE_URL}/admin/realms/${KC_REALM}/clients?clientId=${ADMIN_CLIENT_ID}")
              fi

              CLIENT_INTERNAL_ID=$(echo "${clients_json}" | jq -r '.[0].id')
              echo "[bootstrap] Internal client id: ${CLIENT_INTERNAL_ID}"

              echo "[bootstrap] Fetching service-account user for ${ADMIN_CLIENT_ID}..."
              sa_user=$(curl -s -f \
                -H "Authorization: Bearer ${TOKEN}" \
                "${KC_BASE_URL}/admin/realms/${KC_REALM}/clients/${CLIENT_INTERNAL_ID}/service-account-user")
              SA_USER_ID=$(echo "${sa_user}" | jq -r '.id')
              if [ -z "${SA_USER_ID}" ] || [ "${SA_USER_ID}" = "null" ]; then
                echo "[bootstrap] ERROR: Could not retrieve service-account user." >&2
                exit 1
              fi
              echo "[bootstrap] Service-account user id: ${SA_USER_ID}"

              echo "[bootstrap] Resolving realm-management client id..."
              rm_clients=$(curl -s -f \
                -H "Authorization: Bearer ${TOKEN}" \
                "${KC_BASE_URL}/admin/realms/${KC_REALM}/clients?clientId=realm-management")
              RM_CLIENT_ID=$(echo "${rm_clients}" | jq -r '.[0].id')
              if [ -z "${RM_CLIENT_ID}" ] || [ "${RM_CLIENT_ID}" = "null" ]; then
                echo "[bootstrap] ERROR: realm-management client not found." >&2
                exit 1
              fi
              echo "[bootstrap] realm-management internal id: ${RM_CLIENT_ID}"

              echo "[bootstrap] Checking existing role bindings..."
              bound_roles=$(curl -s -f \
                -H "Authorization: Bearer ${TOKEN}" \
                "${KC_BASE_URL}/admin/realms/${KC_REALM}/users/${SA_USER_ID}/role-mappings/clients/${RM_CLIENT_ID}/composite")
              bound_names=$(echo "${bound_roles}" | jq -r '[.[].name] | join(" ")')

              all_roles=$(curl -s -f \
                -H "Authorization: Bearer ${TOKEN}" \
                "${KC_BASE_URL}/admin/realms/${KC_REALM}/clients/${RM_CLIENT_ID}/roles")

              # view-users / manage-users are required so the per-tenant role
              # gate (#196) can resolve admin-created tenant owners by email
              # (`findUserByEmail`) and assign client-role mappings to their
              # Keycloak user (`assignClientRoleToUser`). Without them the
              # provisioner returns 403 from Keycloak and the smoke fails.
              missing_roles="[]"
              for role_name in manage-clients view-clients view-realm view-users manage-users; do
                if echo "${bound_names}" | grep -qw "${role_name}"; then
                  echo "[bootstrap] Role ${role_name} already bound — skipping."
                else
                  role_obj=$(echo "${all_roles}" | jq --arg n "${role_name}" '.[] | select(.name == $n)')
                  if [ -z "${role_obj}" ]; then
                    echo "[bootstrap] ERROR: Role ${role_name} not found in realm-management." >&2
                    exit 1
                  fi
                  missing_roles=$(echo "${missing_roles}" | jq --argjson r "${role_obj}" '. + [$r]')
                  echo "[bootstrap] Will bind role: ${role_name}"
                fi
              done

              if [ "$(echo "${missing_roles}" | jq 'length')" -gt "0" ]; then
                echo "[bootstrap] Binding missing roles..."
                http_code=$(curl -s -o /dev/null -w '%{http_code}' \
                  -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "${missing_roles}" \
                  "${KC_BASE_URL}/admin/realms/${KC_REALM}/users/${SA_USER_ID}/role-mappings/clients/${RM_CLIENT_ID}")
                if [ "${http_code}" != "204" ]; then
                  echo "[bootstrap] ERROR: POST role-mappings returned HTTP ${http_code}." >&2
                  exit 1
                fi
                echo "[bootstrap] Role bindings created (HTTP 204)."
              else
                echo "[bootstrap] All required roles already bound — no changes needed."
              fi

              echo "[bootstrap] Bootstrap complete. ${ADMIN_CLIENT_ID} is ready."
