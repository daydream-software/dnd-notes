<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body {
    margin: 0;
    padding: 40px 32px 80px;
    background: #e9e6f5;
    font-family: var(--font-sans);
    color: #1a1530;
  }
  .row {
    display: grid;
    gap: 36px;
    grid-template-columns: repeat(4, 1fr);
    align-items: start;
  }
  .cell { display: flex; flex-direction: column; gap: 14px; }
  .card {
    height: 130px;
    background: #ffffff;
    border-radius: 18px;
  }
  .name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #1a1530;
  }
  .spec {
    font-family: var(--font-mono);
    font-size: 11px;
    color: #5b4a8a;
    line-height: 1.4;
  }
  .use {
    font-size: 11.5px;
    color: #6b6585;
  }
</style>
<style>
@font-face {
  font-family: 'Geist';
  src: url('../assets/fonts/Geist-Variable.woff2') format('woff2-variations'),
       url('../assets/fonts/Geist-Variable.woff2') format('woff2');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('../assets/fonts/GeistMono-Variable.woff2') format('woff2-variations'),
       url('../assets/fonts/GeistMono-Variable.woff2') format('woff2');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <div class="card" style="box-shadow:0 1px 2px rgba(20,15,55,0.10), 0 2px 4px rgba(20,15,55,0.06)"></div>
      <div class="name">shadow-sm</div>
      <div class="spec">0 1 2 / .10<br/>0 2 4 / .06</div>
      <div class="use">Buttons, chips on hover</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow:0 4px 8px rgba(20,15,55,0.10), 0 10px 20px rgba(20,15,55,0.10)"></div>
      <div class="name">shadow-md</div>
      <div class="spec">0 4 8 / .10<br/>0 10 20 / .10</div>
      <div class="use">Cards, stat pills</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow:0 10px 20px rgba(20,15,55,0.12), 0 24px 48px rgba(20,15,55,0.18)"></div>
      <div class="name">shadow-lg</div>
      <div class="spec">0 10 20 / .12<br/>0 24 48 / .18</div>
      <div class="use">Workspace header, popovers</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow:0 20px 40px rgba(20,15,55,0.18), 0 48px 96px rgba(20,15,55,0.28)"></div>
      <div class="name">shadow-xl</div>
      <div class="spec">0 20 40 / .18<br/>0 48 96 / .28</div>
      <div class="use">Modals, login card</div>
    </div>
  </div>
</body>
</html>
