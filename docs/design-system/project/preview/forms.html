<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); font-family: var(--font-sans); }
  .grid { display: grid; gap: 14px; max-width: 640px; align-items: start; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { color: var(--fg-3); font-size: 12px; letter-spacing: 0.02em; }
  .input { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--brand-line-soft); background: var(--bg-paper-soft); color: var(--fg-1); font: inherit; font-size: 14px; }
  .input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--brand-line); }
  .input input { background: transparent; border: 0; outline: none; color: inherit; flex: 1; font: inherit; }
  svg { width: 18px; height: 18px; fill: var(--fg-muted); }
  .help { color: var(--fg-muted); font-size: 12px; }
</style>
<style>
@font-face {
  font-family: 'Geist';
  src: url('../assets/fonts/Geist-Variable.woff2') format('woff2-variations'),
       url('../assets/fonts/Geist-Variable.woff2') format('woff2');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('../assets/fonts/GeistMono-Variable.woff2') format('woff2-variations'),
       url('../assets/fonts/GeistMono-Variable.woff2') format('woff2');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
</style>
</head>
<body>
  <div class="grid">
  <div class="field">
    <span class="label">Search notes</span>
    <label class="input">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5 1.49-1.49zM10 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8"/></svg>
      <input placeholder="Search title, body, tags, session, or collaborator…" />
    </label>
  </div>
  <div class="field">
    <span class="label">Title</span>
    <label class="input"><input value="Faction brief — The Crimson Court" /></label>
  </div>
  <div class="field">
    <span class="label">Quick capture</span>
    <label class="input"><input placeholder="Jot down a clue, reminder, or scene…" /></label>
    <span class="help">New notes are saved straight to the selected campaign.</span>
  </div>
  </div>
<script src="mode-toggle.js" defer></script>
</body>
</html>
