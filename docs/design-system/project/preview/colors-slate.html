<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Slate foundation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--page-bg); }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(4, 1fr); align-items: start; }
  .swatch { border-radius: var(--radius-md); padding: 14px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--divider); color: #f8fafc; }
  .name { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
  .hex { font-family: var(--font-mono); font-size: 11.5px; opacity: 0.7; }
</style>
<style>
@font-face {
  font-family: 'Geist';
  src: url('../assets/fonts/Geist-Variable.woff2') format('woff2-variations'),
       url('../assets/fonts/Geist-Variable.woff2') format('woff2');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('../assets/fonts/GeistMono-Variable.woff2') format('woff2-variations'),
       url('../assets/fonts/GeistMono-Variable.woff2') format('woff2');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
</style>
</head>
<body>
  <div class="grid">
  <div class="swatch" style="background:#020617"><span class="name">bg-0</span><span class="hex">#020617</span></div>
  <div class="swatch" style="background:#0f172a"><span class="name">bg-1 / default</span><span class="hex">#0F172A</span></div>
  <div class="swatch" style="background:#111827"><span class="name">bg-2</span><span class="hex">#111827</span></div>
  <div class="swatch" style="background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);border-color:var(--brand-line-soft)"><span class="name">bg-paper</span><span class="hex">slate @ 90%</span></div>
  <div class="swatch" style="background:rgba(15,23,42,0.88);border-color:var(--brand-line-soft)"><span class="name">bg-paper-strong</span><span class="hex">slate @ 88%</span></div>
  <div class="swatch" style="background:rgba(15,23,42,0.72);backdrop-filter:blur(12px);border-color:var(--brand-line)"><span class="name">bg-paper-soft</span><span class="hex">slate @ 72%</span></div>
  <div class="swatch" style="background:rgba(15,23,42,0.44);backdrop-filter:blur(12px);border-color:var(--brand-line-faint)"><span class="name">bg-paper-faint</span><span class="hex">slate @ 44%</span></div>
  <div class="swatch" style="background:radial-gradient(circle at top,rgba(124,58,237,0.45),transparent 70%),#0f172a"><span class="name">page-bg halo</span><span class="hex">+ purple radial</span></div>
  </div>
<script src="mode-toggle.js" defer></script>
</body>
</html>
