# EXAMPLE ONLY — do NOT apply this file directly.
# Create the real secret with:
#
#   POSTGRES_USER=postgres
#   POSTGRES_PASSWORD='<strong-random-password>'
#   POSTGRES_DB=keycloak
#
#   kubectl create secret generic platform-postgres-credentials \
#     -n dnd-notes-platform \
#     --from-env-file=<(env | grep '^POSTGRES_')
#
# Or write a temporary file, then delete it after use:
#
#   cat > /tmp/postgres.env <<'EOF'
#   POSTGRES_USER=postgres
#   POSTGRES_PASSWORD=<strong-random-password>
#   POSTGRES_DB=keycloak
#   EOF
#   kubectl create secret generic platform-postgres-credentials \
#     -n dnd-notes-platform \
#     --from-env-file=/tmp/postgres.env
#   rm /tmp/postgres.env
#
# POSTGRES_DB=keycloak: Postgres initialises this database on first start.
# Keycloak connects to jdbc:postgresql://.../keycloak (see keycloak/deployment.yaml).
# The control-plane database (control_plane) and tenant databases must be created
# separately after the pod is running:
#
#   kubectl exec -n dnd-notes-platform platform-postgres-0 -- \
#     psql -U postgres -c "CREATE DATABASE control_plane;"
#
# All Kustomize layers reference this Secret by name; the secret must exist
# in the cluster before any dependent workload (Keycloak, control-plane) will start.
apiVersion: v1
kind: Secret
metadata:
  name: platform-postgres-credentials
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/note: Do not commit real credentials. Apply via kubectl create secret.
type: Opaque
stringData:
  POSTGRES_USER: replace-me
  POSTGRES_PASSWORD: replace-me
  POSTGRES_DB: keycloak
