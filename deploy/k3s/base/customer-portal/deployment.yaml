apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: customer-portal
    app.kubernetes.io/component: customer-portal
    app.kubernetes.io/part-of: dnd-notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-portal
        app.kubernetes.io/component: customer-portal
        app.kubernetes.io/part-of: dnd-notes
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: portal
          image: ghcr.io/daydream-software/dnd-notes-customer-portal
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: customer-portal-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
