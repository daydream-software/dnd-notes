apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-portal
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: customer-portal
    app.kubernetes.io/component: customer-portal
    app.kubernetes.io/part-of: dnd-notes
  # No cert-manager annotation here — TLS is handled by the shared wildcard
  # Certificate in deploy/k3s/base/cert-manager/certificate.yaml which issues
  # daydreamsoftware-wildcard-tls. Adding cluster-issuer here would cause
  # cert-manager to attempt a redundant per-ingress certificate issuance.
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - notes.daydreamsoftware.ca
      secretName: daydreamsoftware-wildcard-tls
  rules:
    - host: notes.daydreamsoftware.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-portal
                port:
                  name: http
