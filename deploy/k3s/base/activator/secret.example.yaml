apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-activator-secrets
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: dnd-notes-activator
    app.kubernetes.io/component: activator
    app.kubernetes.io/part-of: dnd-notes
type: Opaque
stringData:
  # Required: Postgres connection string for the control-plane registry database.
  # The activator reads/writes tenant_activity and reads tenants.
  CONTROL_PLANE_DATABASE_URL: "postgresql://user:password@postgres.dnd-notes-platform.svc.cluster.local:5432/control_plane"
