apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: operator-portal
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: operator-portal
    app.kubernetes.io/component: operator-portal
    app.kubernetes.io/part-of: dnd-notes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - operator.daydreamsoftware.ca
      secretName: daydreamsoftware-wildcard-tls
  rules:
    - host: operator.daydreamsoftware.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: operator-portal
                port:
                  name: http
