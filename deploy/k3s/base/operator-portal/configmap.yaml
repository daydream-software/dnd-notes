apiVersion: v1
kind: ConfigMap
metadata:
  name: operator-portal-config
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: operator-portal
    app.kubernetes.io/component: operator-portal
    app.kubernetes.io/part-of: dnd-notes
data:
  API_BASE_PATH: "/operator-api"
  CONTROL_PLANE_URL: "http://dnd-notes-control-plane.dnd-notes-platform.svc.cluster.local:3001"
  KEYCLOAK_URL: "https://auth.example.com"
  KEYCLOAK_REALM: "dnd-notes-workforce"
  KEYCLOAK_CLIENT_ID: "dnd-notes-control-plane"
  KEYCLOAK_REQUIRED_ROLES: "control-plane-admin,control-plane-workforce"
  CUSTOMER_PORTAL_URL: "https://replace-me.example.com"
