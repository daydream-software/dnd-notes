apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-portal
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: operator-portal
    app.kubernetes.io/component: operator-portal
    app.kubernetes.io/part-of: dnd-notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: operator-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operator-portal
        app.kubernetes.io/component: operator-portal
        app.kubernetes.io/part-of: dnd-notes
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          image: ghcr.io/daydream-software/dnd-notes-operator-portal
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # No capabilities needed: /usr/share/nginx/html is chown'd to
              # 101:0 at image build time (see docker/portal/Dockerfile).
              # PSS Restricted compliant — drop ALL, add nothing.
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          envFrom:
            - configMapRef:
                name: operator-portal-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
