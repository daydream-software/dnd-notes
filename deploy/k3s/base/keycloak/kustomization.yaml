apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Theme ConfigMaps (keycloak-themes-text + keycloak-themes-fonts) are generated
  # from the canonical source files at platform/keycloak/base/themes/.
  # Kustomize resolves the configMapGenerator file paths relative to that directory,
  # so the single source of truth is preserved.
  - ../../../../platform/keycloak/base
  - realm-config.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
