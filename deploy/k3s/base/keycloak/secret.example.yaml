# EXAMPLE ONLY — do NOT apply this file directly.
# For the unified flow (k3d + prod), provision this Secret with the shared
# script: scripts/platform/provision-secrets.sh --mode <k3d|prod> keycloak-bootstrap
# (see docs/deploy/README.md section 3). The manual recipe below is the
# per-secret reference for creating or rotating it by hand.
# Create the real secret with:
#
#   KC_BOOTSTRAP_ADMIN_USERNAME=admin
#   KC_BOOTSTRAP_ADMIN_PASSWORD='<strong-random-password>'
#
#   kubectl create secret generic keycloak-bootstrap-env \
#     -n dnd-notes-platform \
#     --from-env-file=<(env | grep '^KC_BOOTSTRAP_')
#
# Or write a temporary file, then delete it after use:
#
#   cat > /tmp/kc-bootstrap.env <<'EOF'
#   KC_BOOTSTRAP_ADMIN_USERNAME=admin
#   KC_BOOTSTRAP_ADMIN_PASSWORD=<strong-random-password>
#   EOF
#   kubectl create secret generic keycloak-bootstrap-env \
#     -n dnd-notes-platform \
#     --from-env-file=/tmp/kc-bootstrap.env
#   rm /tmp/kc-bootstrap.env
#
# This secret must exist before applying the kustomization; see
# deploy/k3s/overlays/prod/kustomization.yaml prerequisite #4.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-bootstrap-env
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/note: Do not commit real credentials. Apply via kubectl create secret.
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: replace-me
  KC_BOOTSTRAP_ADMIN_PASSWORD: replace-me
