apiVersion: v1
kind: ConfigMap
metadata:
  name: dnd-notes-control-plane-config
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: dnd-notes-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: dnd-notes
data:
  PORT: "3001"
  CONTROL_PLANE_ENABLE_PROVISIONING: "true"
  CONTROL_PLANE_AUTH_MODE: keycloak
  CONTROL_PLANE_KEYCLOAK_URL: https://auth.example.com
  CONTROL_PLANE_KEYCLOAK_JWKS_URL: https://auth.example.com/realms/dnd-notes-workforce/protocol/openid-connect/certs
  CONTROL_PLANE_KEYCLOAK_REALM: dnd-notes-workforce
  CONTROL_PLANE_KEYCLOAK_CLIENT_ID: dnd-notes-control-plane
  CONTROL_PLANE_KEYCLOAK_REQUIRED_ROLES: control-plane-admin,control-plane-workforce
  TENANT_KEYCLOAK_URL: https://auth.example.com
  TENANT_KEYCLOAK_JWKS_URL: https://auth.example.com/realms/dnd-notes/protocol/openid-connect/certs
  TENANT_KEYCLOAK_REALM: dnd-notes
  TENANT_BASE_DOMAIN: replace-me.example.com
  TENANT_INGRESS_CLASS_NAME: traefik
  TENANT_IMAGE_REPOSITORY: ghcr.io/daydream-software/dnd-notes
  TENANT_PUBLIC_SCHEME: https
  TENANT_APP_PORT: "3000"
  TENANT_READY_TIMEOUT_MS: "240000"
  TENANT_TLS_CLUSTER_ISSUER: letsencrypt-prod
  # Scale-to-zero: route tenant Ingress backends through the activator (Pattern B).
  # Set to the activator's in-cluster DNS name to enable; leave unset to disable.
  ACTIVATOR_EXTERNAL_NAME: "dnd-notes-activator.dnd-notes-platform.svc.cluster.local"
  ACTIVATOR_PORT: "8080"
  KEYCLOAK_ADMIN_BASE_URL: https://auth.example.com
  KEYCLOAK_ADMIN_REALM: dnd-notes
  CUSTOMER_PORTAL_KEYCLOAK_URL: https://auth.example.com
  CUSTOMER_PORTAL_KEYCLOAK_JWKS_URL: https://auth.example.com/realms/dnd-notes/protocol/openid-connect/certs
  CUSTOMER_PORTAL_KEYCLOAK_REALM: dnd-notes
  CUSTOMER_PORTAL_KEYCLOAK_CLIENT_ID: dnd-notes-customer-portal
  # The ingress (Traefik in prod, nginx in k3d) sets X-Forwarded-For; Express
  # must be told to trust it or express-rate-limit raises a ValidationError on
  # every request. "1" trusts exactly one upstream proxy hop, preventing IP
  # spoofing via a forged X-Forwarded-For header. Both environments sit behind a
  # single ingress hop, so this default holds for both.
  CONTROL_PLANE_TRUST_PROXY: "1"
