# EXAMPLE ONLY — do NOT apply this file directly.
# Create real secrets with kubectl using --from-env-file to avoid exposing
# secret values in shell history.
#
# Control-plane runtime secrets:
#   Write a temporary env file, apply, then delete it:
#
#   cat > /tmp/control-plane.env <<'EOF'
#   CONTROL_PLANE_ADMIN_TOKEN=<strong-random-token>
#   CONTROL_PLANE_DATABASE_URL=postgresql://postgres:<password>@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/control_plane
#   TENANT_DATABASE_ADMIN_URL=postgresql://postgres:<password>@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/postgres
#   TENANT_DATABASE_RUNTIME_URL=postgresql://postgres:<password>@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/postgres
#   KEYCLOAK_ADMIN_CLIENT_ID=dnd-notes-keycloak-admin
#   KEYCLOAK_ADMIN_CLIENT_SECRET=<keycloak-client-secret>
#   EOF
#   kubectl create secret generic dnd-notes-control-plane-secrets \
#     -n dnd-notes-platform \
#     --from-env-file=/tmp/control-plane.env
#   rm /tmp/control-plane.env
#
# Backup config secrets (Issue #330, optional — pod boots without this):
#
#   cat > /tmp/backup-config.env <<'EOF'
#   BACKUP_DESTINATION=azure-blob
#   AZURE_STORAGE_ACCOUNT=<storage-account-name>
#   AZURE_STORAGE_CONTAINER=<container-name>
#   AZURE_STORAGE_SAS_TOKEN=<sas-token>
#   BACKUP_SCHEDULE_CRON=0 3 * * *
#   BACKUP_RETENTION_DAYS=14
#   EOF
#   kubectl create secret generic dnd-notes-backup-config \
#     -n dnd-notes-platform \
#     --from-env-file=/tmp/backup-config.env
#   rm /tmp/backup-config.env
apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-control-plane-secrets
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/template: replace-before-apply
type: Opaque
stringData:
  CONTROL_PLANE_ADMIN_TOKEN: replace-me
  CONTROL_PLANE_DATABASE_URL: replace-with-control-plane-postgres-url
  TENANT_DATABASE_ADMIN_URL: replace-with-admin-url
  TENANT_DATABASE_RUNTIME_URL: replace-with-runtime-template-url
  KEYCLOAK_ADMIN_CLIENT_ID: dnd-notes-keycloak-admin
  KEYCLOAK_ADMIN_CLIENT_SECRET: replace-me
---
apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-backup-config
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/template: replace-before-apply
type: Opaque
stringData:
  BACKUP_DESTINATION: azure-blob
  AZURE_STORAGE_ACCOUNT: replace-me
  AZURE_STORAGE_CONTAINER: replace-me
  AZURE_STORAGE_SAS_TOKEN: replace-me
  BACKUP_SCHEDULE_CRON: "0 3 * * *"
  BACKUP_RETENTION_DAYS: "14"
