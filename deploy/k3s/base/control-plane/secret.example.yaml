# EXAMPLE ONLY — do NOT apply this file directly.
# Create real secrets with kubectl:
#
# Control-plane runtime secrets:
#   kubectl create secret generic dnd-notes-control-plane-secrets \
#     -n dnd-notes-platform \
#     --from-literal=CONTROL_PLANE_ADMIN_TOKEN='<strong-random-token>' \
#     --from-literal=CONTROL_PLANE_DATABASE_URL='postgresql://postgres:<password>@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/control_plane' \
#     --from-literal=TENANT_DATABASE_ADMIN_URL='postgresql://postgres:<password>@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/postgres' \
#     --from-literal=TENANT_DATABASE_RUNTIME_URL='postgresql://postgres:<password>@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/postgres' \
#     --from-literal=KEYCLOAK_ADMIN_CLIENT_ID='dnd-notes-keycloak-admin' \
#     --from-literal=KEYCLOAK_ADMIN_CLIENT_SECRET='<keycloak-client-secret>'
#
# Backup config secrets (Issue #330):
#   kubectl create secret generic dnd-notes-backup-config \
#     -n dnd-notes-platform \
#     --from-literal=BACKUP_DESTINATION='azure' \
#     --from-literal=AZURE_STORAGE_ACCOUNT='<storage-account-name>' \
#     --from-literal=AZURE_STORAGE_CONTAINER='<container-name>' \
#     --from-literal=AZURE_STORAGE_SAS_TOKEN='<sas-token>' \
#     --from-literal=BACKUP_SCHEDULE_CRON='0 2 * * *' \
#     --from-literal=BACKUP_RETENTION_DAYS='30'
apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-control-plane-secrets
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/template: replace-before-apply
type: Opaque
stringData:
  CONTROL_PLANE_ADMIN_TOKEN: replace-me
  CONTROL_PLANE_DATABASE_URL: replace-with-control-plane-postgres-url
  TENANT_DATABASE_ADMIN_URL: replace-with-admin-url
  TENANT_DATABASE_RUNTIME_URL: replace-with-runtime-template-url
  KEYCLOAK_ADMIN_CLIENT_ID: dnd-notes-keycloak-admin
  KEYCLOAK_ADMIN_CLIENT_SECRET: replace-me
---
apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-backup-config
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/template: replace-before-apply
type: Opaque
stringData:
  BACKUP_DESTINATION: azure
  AZURE_STORAGE_ACCOUNT: replace-me
  AZURE_STORAGE_CONTAINER: replace-me
  AZURE_STORAGE_SAS_TOKEN: replace-me
  BACKUP_SCHEDULE_CRON: "0 2 * * *"
  BACKUP_RETENTION_DAYS: "30"
