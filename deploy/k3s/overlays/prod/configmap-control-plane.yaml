apiVersion: v1
kind: ConfigMap
metadata:
  name: dnd-notes-control-plane-config
  namespace: dnd-notes-platform
data:
  PORT: "3001"
  CONTROL_PLANE_ENABLE_PROVISIONING: "true"
  CONTROL_PLANE_AUTH_MODE: keycloak
  CONTROL_PLANE_KEYCLOAK_URL: https://auth.daydreamsoftware.ca
  CONTROL_PLANE_KEYCLOAK_JWKS_URL: http://platform-keycloak.dnd-notes-platform.svc.cluster.local:8080/realms/dnd-notes-workforce/protocol/openid-connect/certs
  CONTROL_PLANE_KEYCLOAK_REALM: dnd-notes-workforce
  CONTROL_PLANE_KEYCLOAK_CLIENT_ID: dnd-notes-control-plane
  CONTROL_PLANE_KEYCLOAK_REQUIRED_ROLES: control-plane-admin,control-plane-workforce
  TENANT_KEYCLOAK_URL: https://auth.daydreamsoftware.ca
  TENANT_KEYCLOAK_JWKS_URL: http://platform-keycloak.dnd-notes-platform.svc.cluster.local:8080/realms/dnd-notes/protocol/openid-connect/certs
  TENANT_KEYCLOAK_REALM: dnd-notes
  TENANT_BASE_DOMAIN: notes.daydreamsoftware.ca
  TENANT_INGRESS_CLASS_NAME: traefik
  TENANT_IMAGE_REPOSITORY: ghcr.io/daydream-software/dnd-notes
  TENANT_PUBLIC_SCHEME: https
  TENANT_APP_PORT: "3000"
  TENANT_READY_TIMEOUT_MS: "240000"
  TENANT_TLS_CLUSTER_ISSUER: letsencrypt-prod
  KEYCLOAK_ADMIN_BASE_URL: http://platform-keycloak.dnd-notes-platform.svc.cluster.local:8080
  KEYCLOAK_ADMIN_REALM: dnd-notes
  CUSTOMER_PORTAL_KEYCLOAK_URL: https://auth.daydreamsoftware.ca
  CUSTOMER_PORTAL_KEYCLOAK_JWKS_URL: http://platform-keycloak.dnd-notes-platform.svc.cluster.local:8080/realms/dnd-notes/protocol/openid-connect/certs
  CUSTOMER_PORTAL_KEYCLOAK_REALM: dnd-notes
  CUSTOMER_PORTAL_KEYCLOAK_CLIENT_ID: dnd-notes-customer-portal
  # Traefik sets X-Forwarded-For; Express must be told to trust it or
  # express-rate-limit raises a ValidationError on every request.
  CONTROL_PLANE_TRUST_PROXY: "true"
