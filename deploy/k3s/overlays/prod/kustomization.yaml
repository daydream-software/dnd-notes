apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for daydreamsoftware.ca on k3s.
#
# Prerequisites before applying:
#   1. cert-manager v1.16.3 installed (see deploy/k3s/base/cert-manager/cluster-issuer.yaml)
#   2. Cloudflare API token secret in cert-manager namespace
#   3. platform-postgres-credentials secret in dnd-notes-platform namespace
#   4. keycloak-bootstrap-env secret in dnd-notes-platform namespace
#   5. dnd-notes-control-plane-secrets secret in dnd-notes-platform namespace
#   6. Optional: dnd-notes-backup-config secret in dnd-notes-platform namespace (Issue #330)
#      The control-plane pod boots without this secret (all backup env vars use optional: true).
#      Backup functionality is disabled until this secret is applied.
#   7. GHCR image pull secret if images are private:
#        kubectl create secret docker-registry ghcr-pull-secret \
#          -n dnd-notes-platform \
#          --docker-server=ghcr.io \
#          --docker-username=<github-username> \
#          --docker-password=<github-pat-with-read:packages>
#
# Apply:
#   kubectl kustomize deploy/k3s/overlays/prod | kubectl apply -f -

resources:
- ../../base

# Prod-specific ConfigMaps (override base placeholders with real daydreamsoftware.ca values)
patches:
- path: configmap-control-plane.yaml
- path: configmap-customer-portal.yaml
- path: configmap-operator-portal.yaml

# Image tags: pinned to an explicit sentinel so applying the overlay without
# substituting a real tag fails fast (ImagePullBackOff on a nonexistent tag)
# instead of silently rolling to whatever :latest happens to be. This is
# deliberate — :latest in prod hides incident-rollback and audit trails.
#
# Before deploying, substitute each newTag below with the immutable sha-* tag
# from the GHCR push workflow (Issue #331). Recommended workflow:
#
#   TAG=sha-abcdef0  # short SHA of the main commit to deploy
#   cd deploy/k3s/overlays/prod
#   kustomize edit set image \
#     ghcr.io/daydream-software/dnd-notes-control-plane=ghcr.io/daydream-software/dnd-notes-control-plane:${TAG} \
#     ghcr.io/daydream-software/dnd-notes-customer-portal=ghcr.io/daydream-software/dnd-notes-customer-portal:${TAG} \
#     ghcr.io/daydream-software/dnd-notes-operator-portal=ghcr.io/daydream-software/dnd-notes-operator-portal:${TAG}
#
# See the runbook in Issue #329, section 4 "Daily ops / Deploy a new image
# version" for the full deploy procedure.
images:
- name: ghcr.io/daydream-software/dnd-notes-control-plane
  newName: ghcr.io/daydream-software/dnd-notes-control-plane
  newTag: sha-04e3c4a
- name: ghcr.io/daydream-software/dnd-notes-customer-portal
  newName: ghcr.io/daydream-software/dnd-notes-customer-portal
  newTag: sha-04e3c4a
- name: ghcr.io/daydream-software/dnd-notes-operator-portal
  newName: ghcr.io/daydream-software/dnd-notes-operator-portal
  newTag: sha-04e3c4a
