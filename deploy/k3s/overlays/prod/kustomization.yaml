apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for daydreamsoftware.ca on k3s.
#
# Prerequisites before applying:
#   1. cert-manager v1.16.3 installed (see deploy/k3s/base/cert-manager/cluster-issuer.yaml)
#   2. Cloudflare API token secret in cert-manager namespace
#   3-6. Platform Secrets in the dnd-notes-platform namespace. Provision all of
#      them with the SAME shared script used for local k3d (epic #362):
#        export PLATFORM_POSTGRES_USER=... PLATFORM_POSTGRES_PASSWORD=... PLATFORM_POSTGRES_DB=keycloak
#        export KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME=... KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD=...
#        export CONTROL_PLANE_DATABASE_URL=... TENANT_DATABASE_ADMIN_URL=... TENANT_DATABASE_RUNTIME_URL=...
#        export ACTIVATOR_CONTROL_PLANE_DATABASE_URL=...   # defaults to CONTROL_PLANE_DATABASE_URL
#        scripts/platform/provision-secrets.sh --mode prod --context dnd-notes-prod
#      In --mode prod the script has NO defaults for real secrets — it fails
#      loudly listing any unset required variable. It creates:
#        - platform-postgres-credentials
#        - keycloak-bootstrap-env
#        - dnd-notes-control-plane-secrets   (KEYCLOAK_ADMIN_CLIENT_SECRET set after first deploy)
#        - dnd-notes-activator-secrets        (#363: required for prod scale-to-zero)
#      See docs/deploy/README.md section 3 for the full procedure (env files,
#      umask, and the post-deploy KEYCLOAK_ADMIN_CLIENT_SECRET patch).
#   7. Optional: dnd-notes-backup-config secret in dnd-notes-platform namespace (Issue #330)
#      The control-plane pod boots without this secret (all backup env vars use optional: true).
#      Backup functionality is disabled until this secret is applied.
#   8. GHCR image pull secret if images are private:
#        kubectl create secret docker-registry ghcr-pull-secret \
#          -n dnd-notes-platform \
#          --docker-server=ghcr.io \
#          --docker-username=<github-username> \
#          --docker-password=<github-pat-with-read:packages>
#
# Apply:
#   kubectl kustomize deploy/k3s/overlays/prod | kubectl apply -f -

resources:
- ../../base
# cert-manager issuer + wildcard certificate are prod-specific (Let's Encrypt
# via Cloudflare DNS-01). The k3d overlay supplies a dev-ca CA issuer instead.
- cluster-issuer.yaml
- certificate.yaml

# Prod-specific ConfigMaps (override base placeholders with real daydreamsoftware.ca values)
patches:
- path: configmap-control-plane.yaml
- path: configmap-customer-portal.yaml
- path: configmap-operator-portal.yaml

# Image tags: pinned to a protected prod-* tag.
#
# Tag convention: prod-YYYYMMDD (e.g. prod-20260521), with a time suffix
# (prod-YYYYMMDD-HHMMSSz) when more than one promotion lands on the same day.
# These tags are excluded from the sha-* retention cleanup in CI and will not
# be deleted by build churn (see deployment-artifacts.yml ignore-versions).
#
# Deploy flow:
#   1. CI pushes sha-<commit> tags on every merge to main.
#   2. When ready to deploy, promote the chosen build to a protected tag:
#        scripts/platform/promote-prod-image.sh sha-<commit> [prod-<date>]
#      This retags all 5 images without rebuilding (docker buildx imagetools create).
#   3. Update the newTag values below to the promoted prod-* tag.
#   4. Commit the change and apply:
#        kubectl kustomize deploy/k3s/overlays/prod | kubectl --context dnd-notes-prod apply -f -
#
# The tenant image (dnd-notes) is not listed here because it is referenced
# dynamically by the control-plane at tenant provisioning time via
# TENANT_IMAGE_REPOSITORY in the ConfigMap. It uses the same prod-* tag and
# must also be promoted by the script above.
#
# See docs/deploy/README.md section 4 for the full procedure.
images:
- name: ghcr.io/daydream-software/dnd-notes-control-plane
  newName: ghcr.io/daydream-software/dnd-notes-control-plane
  newTag: prod-pin-before-deploy
- name: ghcr.io/daydream-software/dnd-notes-customer-portal
  newName: ghcr.io/daydream-software/dnd-notes-customer-portal
  newTag: prod-pin-before-deploy
- name: ghcr.io/daydream-software/dnd-notes-operator-portal
  newName: ghcr.io/daydream-software/dnd-notes-operator-portal
  newTag: prod-pin-before-deploy
- name: ghcr.io/daydream-software/dnd-notes-activator
  newName: ghcr.io/daydream-software/dnd-notes-activator
  newTag: prod-pin-before-deploy
