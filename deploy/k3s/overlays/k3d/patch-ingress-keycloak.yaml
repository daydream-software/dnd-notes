apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  annotations:
    cert-manager.io/cluster-issuer: dev-ca
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.127.0.0.1.nip.io
      secretName: platform-keycloak-tls
  rules:
    - host: keycloak.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-keycloak
                port:
                  name: http
