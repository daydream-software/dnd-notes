<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    D&D Notes brand mark — d20 silhouette
    Canonical source: packages/theme/assets/favicon.svg
    Copy to each app's public/favicon.svg when this file changes.
    Palette: #a78bfa (primary), #f59e0b (accent), #0f172a (background)
  -->

  <!-- Dark background disc -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- d20 outer polygon (pentagon rotated so flat edge is at top) -->
  <!-- Vertices of a regular pentagon centered at (16,17), r=13, top-flat -->
  <!-- top-left: (6.1, 10.2), top-right: (25.9, 10.2), bottom-right: (30, 22), bottom: (16, 29.5), bottom-left: (2, 22) -->
  <polygon
    points="16,3.5 29.3,12.2 24.2,28 7.8,28 2.7,12.2"
    fill="#a78bfa"
    opacity="0.15"
    stroke="#a78bfa"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Inner triangle (top face of d20) -->
  <polygon
    points="16,8 23.5,21 8.5,21"
    fill="none"
    stroke="#a78bfa"
    stroke-width="1.25"
    stroke-linejoin="round"
  />

  <!-- Left face edge -->
  <line x1="16" y1="3.5" x2="8.5" y2="21" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <!-- Right face edge -->
  <line x1="16" y1="3.5" x2="23.5" y2="21" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>

  <!-- Amber accent pip — the "20" crit moment -->
  <circle cx="16" cy="15.5" r="2" fill="#f59e0b"/>
</svg>
