# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      lexical:
        patterns:
          - "lexical"
          - "@lexical/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
      express:
        patterns:
          - "express"
          - "@types/express"
      cors:
        patterns:
          - "cors"
          - "@types/cors"
      pg:
        patterns:
          - "pg"
          - "@types/pg"
      supertest:
        patterns:
          - "supertest"
          - "@types/supertest"
      jsdom:
        patterns:
          - "jsdom"
          - "@types/jsdom"
    ignore:
      # @types/node is pinned to ^24.x because @kubernetes/client-node@1.x
      # declares @types/node@^24 as a peer; npm's workspace deduplication
      # propagates that pin across every workspace's node_modules regardless
      # of declared range. Runtime stays on Node 22 (.nvmrc); only the types
      # are permissive. Allow patch/minor bumps within 24.x; block majors so
      # dependabot stops re-proposing 25.x.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
