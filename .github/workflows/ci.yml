name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Ensure Python is available for native npm fallbacks
        run: |
          command -v python3 >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y python3
          }

      - name: Install dependencies
        run: npm ci

      - name: Install kubectl (for kustomize render checks)
        env:
          KUBECTL_VERSION: v1.35.4
        run: |
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          # Verify against the official upstream checksum (matches the pinned
          # version automatically, so no manually-pinned digest to keep in sync).
          curl -fsSLo kubectl.sha256 "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
          rm -f kubectl.sha256
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Validate unified deploy manifests
        run: npm run platform:validate

      - name: Validate render parity (k3d vs prod)
        run: npm run platform:render-parity

      - name: Lint
        run: npm run lint

      - name: Test
        id: test
        continue-on-error: true
        run: npm run test:ci

      - name: Publish consolidated test results
        if: ${{ always() && hashFiles('reports/test-results/**/*.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@27d65e188ec43221b20d26de30f4892fad91df2f # v2.22.0
        with:
          check_name: Test Results
          comment_mode: off
          files: reports/test-results/**/*.xml

      - name: Add coverage summary
        if: ${{ always() && hashFiles('reports/coverage/summary.md') != '' }}
        run: cat reports/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: npm run build

      - name: Fail job if tests failed
        if: ${{ steps.test.outcome == 'failure' }}
        run: exit 1
