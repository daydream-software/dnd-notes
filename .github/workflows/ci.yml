name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22.21.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        id: test
        continue-on-error: true
        run: npm run test:ci

      - name: Publish consolidated test results
        if: ${{ always() && hashFiles('reports/test-results/**/*.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@27d65e188ec43221b20d26de30f4892fad91df2f # v2.22.0
        with:
          check_name: Test Results
          comment_mode: off
          files: reports/test-results/**/*.xml

      - name: Add coverage summary
        if: ${{ always() && hashFiles('reports/coverage/summary.md') != '' }}
        run: cat reports/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: ${{ always() && hashFiles('reports/coverage/**/*') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: reports/coverage

      - name: Build
        run: npm run build

      - name: Fail job if tests failed
        if: ${{ steps.test.outcome == 'failure' }}
        run: exit 1
