name: Copilot PR Gatekeeper

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ['CI']
    types: [completed]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  evaluate-and-merge:
    if: >
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate squad PR merge gate
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reviewer = 'copilot-pull-request-reviewer[bot]';
            const ciWorkflowId = 'ci.yml';
            const mergeTracePrefix = '[copilot-gatekeeper] merge-trace';
            const mergeTraceMarker = 'copilot-gatekeeper-merge-trace';

            function normalizeLogin(login) {
              return (login ?? '').toLowerCase().replace(/\[bot\]$/, '');
            }

            function shortSha(sha) {
              return (sha ?? '').slice(0, 7);
            }

            function matchesReviewer(login) {
              return normalizeLogin(login) === normalizeLogin(reviewer);
            }

            function isSquadFlow(pr) {
              return pr.base.ref === 'main' && pr.head.ref.startsWith('squad/');
            }

            function uniquePullNumbers(pullNumbers) {
              return [...new Set(pullNumbers.filter(Boolean))];
            }

            function getTriggerContext() {
              const gateRunId = process.env.GITHUB_RUN_ID ?? 'unknown';
              const gateRunAttempt = process.env.GITHUB_RUN_ATTEMPT ?? '1';

              if (context.eventName === 'workflow_run') {
                const sourceRun = context.payload.workflow_run;
                return `workflow_run:${sourceRun?.name ?? 'unknown'}#${sourceRun?.id ?? 'unknown'} attempt ${sourceRun?.run_attempt ?? '1'} (${sourceRun?.conclusion ?? sourceRun?.status ?? 'unknown'}) -> gate #${gateRunId}/${gateRunAttempt}`;
              }

              if (context.eventName === 'pull_request_review') {
                return `pull_request_review:${context.payload.review?.state ?? 'unknown'}@${shortSha(context.payload.review?.commit_id)} -> gate #${gateRunId}/${gateRunAttempt}`;
              }

              if (context.eventName === 'pull_request_target') {
                return `pull_request_target:${context.payload.action ?? 'unknown'} -> gate #${gateRunId}/${gateRunAttempt}`;
              }

              return `${context.eventName} -> gate #${gateRunId}/${gateRunAttempt}`;
            }

            async function getTargetPullNumbers() {
              if (context.eventName === 'pull_request_target' || context.eventName === 'pull_request_review') {
                return uniquePullNumbers([context.payload.pull_request?.number]);
              }

              if (context.eventName === 'workflow_run') {
                return uniquePullNumbers(
                  (context.payload.workflow_run.pull_requests ?? []).map((pr) => pr.number),
                );
              }

              if (context.eventName === 'schedule' || context.eventName === 'workflow_dispatch') {
                const openPulls = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: 'open',
                  base: 'main',
                  per_page: 100,
                });

                return uniquePullNumbers(
                  openPulls.filter((pr) => isSquadFlow(pr)).map((pr) => pr.number),
                );
              }

              return [];
            }

            async function getPullRequest(pullNumber) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              return pr;
            }

            async function getLatestCiRun(pullNumber, headSha) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: ciWorkflowId,
                event: 'pull_request',
                head_sha: headSha,
                per_page: 20,
              });

              return (
                data.workflow_runs.find((run) => {
                  if (run.head_sha !== headSha || run.event !== 'pull_request') {
                    return false;
                  }

                  const attachedPullRequests = run.pull_requests ?? [];

                  return (
                    attachedPullRequests.length === 0 ||
                    attachedPullRequests.some((candidate) => candidate.number === pullNumber)
                  );
                }) ?? null
              );
            }

            async function getFreshCopilotReview(pullNumber, headSha) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });

              return (
                reviews
                  .filter(
                    (review) =>
                      matchesReviewer(review.user?.login) &&
                      review.commit_id === headSha &&
                      review.state !== 'DISMISSED',
                  )
                  .sort(
                    (left, right) =>
                      Date.parse(right.submitted_at ?? 0) -
                      Date.parse(left.submitted_at ?? 0),
                  )[0] ?? null
              );
            }

            async function getActiveCopilotThreadCount(pullNumber) {
              const reviewThreadQuery = `
                query($owner: String!, $repo: String!, $pullNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                          isOutdated
                          comments(first: 20) {
                            nodes {
                              author {
                                login
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              const reviewThreadResult = await github.graphql(reviewThreadQuery, {
                owner,
                repo,
                pullNumber,
              });

              const threads =
                reviewThreadResult.repository.pullRequest.reviewThreads.nodes ?? [];

              return threads.filter((thread) => {
                if (thread.isResolved || thread.isOutdated) {
                  return false;
                }

                return thread.comments.nodes.some(
                  (comment) => matchesReviewer(comment.author?.login),
                );
              }).length;
            }

            async function findExistingMergeTraceComment(pullNumber, headSha) {
              const marker = `<!-- ${mergeTraceMarker}:${headSha} -->`;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullNumber,
                per_page: 100,
              });

              return comments.find((comment) => comment.body?.includes(marker)) ?? null;
            }

            async function ensureMergeTraceComment(
              pr,
              { ciRun, freshReview, activeCopilotThreadCount },
            ) {
              const existingComment = await findExistingMergeTraceComment(
                pr.number,
                pr.head.sha,
              );

              if (existingComment) {
                core.info(
                  `Merge trace note already exists for PR #${pr.number} at ${shortSha(pr.head.sha)}`,
                );
                return;
              }

              const reviewSubmittedAt = freshReview?.submitted_at ?? 'unknown';
              const body = [
                `${mergeTracePrefix} — eligible for squash merge`,
                `<!-- ${mergeTraceMarker}:${pr.head.sha} -->`,
                `- head: \`${pr.head.sha}\``,
                `- ci: ✅ success on this SHA via \`CI\` run #${ciRun.run_number ?? 'n/a'} (id ${ciRun.id})`,
                `- copilot-review: ✅ fresh \`${freshReview?.state ?? 'UNKNOWN'}\` review on this SHA at ${reviewSubmittedAt}`,
                `- copilot-threads: ✅ ${activeCopilotThreadCount} active unresolved Copilot threads`,
                `- trigger/run: \`${getTriggerContext()}\``,
              ].join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });

              core.info(`Recorded merge trace note for PR #${pr.number}`);
            }

            async function mergePullRequest(pr) {
              const commitMessage = (pr.body ?? '').trim();

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  sha: pr.head.sha,
                  commit_title: pr.title,
                  commit_message:
                    commitMessage.length > 0
                      ? commitMessage
                      : `Squash merge of #${pr.number}`,
                });

                core.info(`Squash-merged PR #${pr.number}`);
              } catch (error) {
                if (error.status === 405 || error.status === 409 || error.status === 422) {
                  core.info(`PR #${pr.number} is not mergeable yet: ${error.message}`);
                  return;
                }

                throw error;
              }
            }

            const pullNumbers = await getTargetPullNumbers();

            if (pullNumbers.length === 0) {
              core.info('No pull requests to evaluate');
              return;
            }

            for (const pullNumber of pullNumbers) {
              const pr = await getPullRequest(pullNumber);

              if (pr.state !== 'open') {
                core.info(`Skipping PR #${pullNumber} because it is closed`);
                continue;
              }

              if (pr.draft) {
                core.info(`Skipping PR #${pullNumber} because it is still a draft`);
                continue;
              }

              if (!isSquadFlow(pr)) {
                core.info(`Skipping PR #${pullNumber} outside the squad/* -> main flow`);
                continue;
              }

              const ciRun = await getLatestCiRun(pullNumber, pr.head.sha);

              if (!ciRun) {
                core.info(`Skipping PR #${pullNumber} because CI has not run on the current head SHA`);
                continue;
              }

              if (ciRun.status !== 'completed') {
                core.info(`Skipping PR #${pullNumber} because CI is still running for the current head SHA`);
                continue;
              }

              if (ciRun.conclusion !== 'success') {
                core.info(`Skipping PR #${pullNumber} because CI is not green on the current head SHA`);
                continue;
              }

              const freshReview = await getFreshCopilotReview(pullNumber, pr.head.sha);

              if (!freshReview) {
                core.info(`Skipping PR #${pullNumber} because Copilot has not reviewed the current head SHA`);
                continue;
              }

              const activeCopilotThreadCount = await getActiveCopilotThreadCount(
                pullNumber,
              );

              if (activeCopilotThreadCount > 0) {
                core.info(`Skipping PR #${pullNumber} because Copilot still has active threads`);
                continue;
              }

              await ensureMergeTraceComment(pr, {
                ciRun,
                freshReview,
                activeCopilotThreadCount,
              });
              await mergePullRequest(pr);
            }
