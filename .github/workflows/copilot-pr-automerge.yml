name: Copilot PR Automerge

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge reviewed squad PRs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reviewer = 'copilot-pull-request-reviewer[bot]';
            const prs = context.payload.workflow_run.pull_requests ?? [];

            if (context.payload.workflow_run.event !== 'pull_request') {
              core.info('Skipping non-PR CI run');
              return;
            }

            if (prs.length === 0) {
              core.info('No pull requests attached to this CI run');
              return;
            }

            for (const prRef of prs) {
              const pullNumber = prRef.number;
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              if (pr.state !== 'open' || pr.draft) {
                core.info(`Skipping PR #${pullNumber} because it is not mergeable yet`);
                continue;
              }

              if (pr.base.ref !== 'main' || !pr.head.ref.startsWith('squad/')) {
                core.info(`Skipping PR #${pullNumber} outside the squad/* -> main flow`);
                continue;
              }

              if (pr.head.sha !== context.payload.workflow_run.head_sha) {
                core.info(`Skipping PR #${pullNumber} because this CI run is stale`);
                continue;
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });

              const hasCopilotReview = reviews.some((review) => review.user?.login === reviewer);

              if (!hasCopilotReview) {
                core.info(`Skipping PR #${pullNumber} because Copilot has not reviewed it yet`);
                continue;
              }

              const reviewThreadQuery = `
                query($owner: String!, $repo: String!, $pullNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                          isOutdated
                          comments(first: 20) {
                            nodes {
                              author {
                                login
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              const reviewThreadResult = await github.graphql(reviewThreadQuery, {
                owner,
                repo,
                pullNumber,
              });

              const threads =
                reviewThreadResult.repository.pullRequest.reviewThreads.nodes ?? [];
              const hasActiveCopilotThread = threads.some((thread) => {
                if (thread.isResolved || thread.isOutdated) {
                  return false;
                }

                return thread.comments.nodes.some(
                  (comment) => comment.author?.login === reviewer,
                );
              });

              if (hasActiveCopilotThread) {
                core.info(`Skipping PR #${pullNumber} because Copilot still has active threads`);
                continue;
              }

              const commitMessage = (pr.body ?? '').trim();

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pullNumber,
                merge_method: 'squash',
                commit_title: pr.title,
                commit_message:
                  commitMessage.length > 0
                    ? commitMessage
                    : `Squash merge of #${pullNumber}`,
              });

              core.info(`Squash-merged PR #${pullNumber}`);
            }
