name: Copilot PR Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Copilot assign token
        env:
          COPILOT_ASSIGN_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
        run: |
          if [ -z "$COPILOT_ASSIGN_TOKEN" ]; then
            echo "::error title=Missing COPILOT_ASSIGN_TOKEN::Set the COPILOT_ASSIGN_TOKEN Actions secret so Copilot review requests use a real user token."
            exit 1
          fi

      - name: Request Copilot review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          script: |
            const reviewer = 'copilot-pull-request-reviewer[bot]';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function isCopilotReviewer(user) {
              const login = user?.login?.toLowerCase() ?? '';
              return login === reviewer || login.includes('copilot');
            }

            async function getPull(pullNumber) {
              const { data: pull } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              return pull;
            }

            function hasRequestedCopilot(pull) {
              return pull.requested_reviewers?.some(isCopilotReviewer) ?? false;
            }

            async function requestReview(pullNumber, reason) {
              const before = await getPull(pullNumber);

              if (hasRequestedCopilot(before)) {
                core.info(`Copilot review already requested for PR #${pullNumber} (${reason})`);
                return;
              }

              try {
                await github.request(
                  'POST /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers',
                  {
                    owner,
                    repo,
                    pull_number: pullNumber,
                    reviewers: [reviewer],
                    headers: {
                      'X-GitHub-Api-Version': '2022-11-28',
                    },
                  },
                );

                core.info(`Requested Copilot review for PR #${pullNumber} (${reason})`);
              } catch (error) {
                if (error.status === 422) {
                  core.info(
                    `Copilot review request returned 422 for PR #${pullNumber} (${reason}); verifying reviewer state: ${error.message}`,
                  );
                } else {
                  throw error;
                }
              }

              const after = await getPull(pullNumber);

              if (!hasRequestedCopilot(after)) {
                throw new Error(
                  `Copilot review request did not attach a requested reviewer to PR #${pullNumber} (${reason}). Check COPILOT_ASSIGN_TOKEN permissions and Copilot access.`,
                );
              }

              core.info(`Verified Copilot is attached as a requested reviewer for PR #${pullNumber} (${reason})`);
            }

            if (context.eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;

              if (pr.draft) {
                core.info(`Skipping draft PR #${pr.number}`);
                return;
              }

              if (pr.base.ref !== 'main' || !pr.head.ref.startsWith('squad/')) {
                core.info('Skipping PR outside the squad/* -> main flow');
                return;
              }

              await requestReview(pr.number, context.payload.action);
              return;
            }

            const comment = context.payload.comment;

            if (!context.payload.issue.pull_request) {
              core.info('Skipping non-PR issue comment');
              return;
            }

            const body = comment.body.trim().toLowerCase();
            const matchesCommand =
              body.includes('@copilot review this please') || body.includes('/copilot-review');

            if (!matchesCommand) {
              core.info('Skipping unrelated PR comment');
              return;
            }

            const pr = await getPull(context.payload.issue.number);

            if (pr.state !== 'open' || pr.draft) {
              core.info(`Skipping PR #${pr.number} because it is not ready for review`);
              return;
            }

            if (pr.base.ref !== 'main' || !pr.head.ref.startsWith('squad/')) {
              core.info('Skipping PR outside the squad/* -> main flow');
              return;
            }

            await requestReview(pr.number, 'comment-command');
