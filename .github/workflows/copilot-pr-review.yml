name: Copilot PR Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const reviewer = 'copilot-pull-request-reviewer[bot]';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function requestReview(pullNumber, reason) {
              await github.request('POST /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers', {
                owner,
                repo,
                pull_number: pullNumber,
                reviewers: [reviewer],
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });

              core.info(`Requested Copilot review for PR #${pullNumber} (${reason})`);
            }

            if (context.eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;

              if (pr.base.ref !== 'main' || !pr.head.ref.startsWith('squad/')) {
                core.info('Skipping PR outside the squad/* -> main flow');
                return;
              }

              await requestReview(pr.number, context.payload.action);
              return;
            }

            const comment = context.payload.comment;

            if (!context.payload.issue.pull_request) {
              core.info('Skipping non-PR issue comment');
              return;
            }

            const body = comment.body.trim().toLowerCase();
            const matchesCommand =
              body.includes('@copilot review this please') || body.includes('/copilot-review');

            if (!matchesCommand) {
              core.info('Skipping unrelated PR comment');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: context.payload.issue.number,
            });

            if (pr.base.ref !== 'main' || !pr.head.ref.startsWith('squad/')) {
              core.info('Skipping PR outside the squad/* -> main flow');
              return;
            }

            await requestReview(pr.number, 'comment-command');
