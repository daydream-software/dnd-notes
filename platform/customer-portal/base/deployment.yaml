apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: customer-portal
    app.kubernetes.io/part-of: dnd-notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-portal
    spec:
      containers:
        - name: portal
          image: ghcr.io/daydream-software/dnd-notes-customer-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: customer-portal-config
