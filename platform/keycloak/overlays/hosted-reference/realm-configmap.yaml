apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/note: >
      Production realm seed for hosted-reference environments. Does not include
      seeded users (operators provision accounts via Keycloak admin console or
      SSO federation). RedirectURIs and webOrigins use placeholder values —
      replace with actual managed-cluster URLs before apply.
data:
  dnd-notes-realm.json: |
    {
      "realm": "dnd-notes",
      "enabled": true,
      "displayName": "D&D Notes",
      "registrationAllowed": false,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "clients": [
        {
          "clientId": "dnd-notes-tenant-app",
          "enabled": false,
          "publicClient": true,
          "standardFlowEnabled": false,
          "bearerOnly": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "redirectUris": [],
          "webOrigins": []
        },
        {
          "clientId": "dnd-notes-control-plane",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "bearerOnly": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            "https://operator.example.com/*"
          ],
          "webOrigins": [
            "https://operator.example.com"
          ],
          "attributes": {
            "login_theme": "operator-login"
          }
        },
        {
          "clientId": "dnd-notes-customer-portal",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "bearerOnly": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            "https://portal.example.com/*"
          ],
          "webOrigins": [
            "https://portal.example.com"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "login_theme": "customer-login"
          }
        },
        {
          "clientId": "dnd-notes-keycloak-admin",
          "enabled": true,
          "publicClient": false,
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "replace-with-managed-secret"
        }
      ],
      "roles": {
        "client": {
          "dnd-notes-control-plane": [
            {
              "name": "control-plane-admin",
              "clientRole": true
            },
            {
              "name": "control-plane-workforce",
              "clientRole": true
            }
          ]
        }
      }
    }
