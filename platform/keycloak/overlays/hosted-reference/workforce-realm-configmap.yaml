apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-workforce-realm
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/note: >
      Workforce realm seed for hosted-reference. Covers operators / control-plane
      staff only. Does not include seeded users — operators are provisioned via
      the Keycloak admin console or SSO federation. RedirectURIs and webOrigins
      use placeholder values — replace with actual managed-cluster URLs before apply.
data:
  dnd-notes-workforce-realm.json: |
    {
      "realm": "dnd-notes-workforce",
      "enabled": true,
      "displayName": "D&D Notes Workforce",
      "registrationAllowed": false,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "clients": [
        {
          "clientId": "dnd-notes-control-plane",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "bearerOnly": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            "https://operator.example.com/*"
          ],
          "webOrigins": [
            "https://operator.example.com"
          ],
          "attributes": {
            "login_theme": "operator-login"
          }
        }
      ],
      "roles": {
        "client": {
          "dnd-notes-control-plane": [
            {
              "name": "control-plane-admin",
              "clientRole": true
            },
            {
              "name": "control-plane-workforce",
              "clientRole": true
            }
          ]
        }
      }
    }
