---
apiVersion: v1
kind: Secret
metadata:
  name: platform-keycloak-bootstrap-env
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/warning: Development-only bootstrap credentials. Never reuse outside local k3d.
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: admin
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: platform-keycloak
    app.kubernetes.io/part-of: dnd-notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-keycloak
        app.kubernetes.io/part-of: dnd-notes
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2.4
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
            - --import-realm
            - --http-port=8080
            - --proxy-headers=xforwarded
          envFrom:
            - secretRef:
                name: platform-keycloak-bootstrap-env
          env:
            - name: KC_HOSTNAME
              value: https://keycloak.127.0.0.1.nip.io
            - name: KC_HOSTNAME_STRICT
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-import
          configMap:
            name: platform-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: platform-keycloak
    app.kubernetes.io/part-of: dnd-notes
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: platform-keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: platform-keycloak
    app.kubernetes.io/part-of: dnd-notes
  annotations:
    cert-manager.io/cluster-issuer: dev-ca
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.127.0.0.1.nip.io
      secretName: platform-keycloak-tls
  rules:
    - host: keycloak.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-keycloak
                port:
                  name: http
