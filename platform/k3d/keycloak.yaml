apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-keycloak-realm
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/warning: Development-only realm seed. Never reuse seeded credentials outside local k3d.
data:
  dnd-notes-dev-realm.json: |
    {
      "realm": "dnd-notes-dev",
      "enabled": true,
      "displayName": "dnd-notes Dev",
      "registrationAllowed": false,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "users": [
        {
          "username": "owner@example.com",
          "email": "owner@example.com",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Owner",
          "lastName": "User",
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ]
        },
        {
          "username": "site-admin@example.com",
          "email": "site-admin@example.com",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Site",
          "lastName": "Admin",
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "clientRoles": {
            "dnd-notes-control-plane": ["admin"]
          }
        }
      ],
      "clients": [
        {
          "clientId": "dnd-notes-tenant-app",
          "enabled": true,
          "publicClient": false,
          "standardFlowEnabled": true,
          "bearerOnlyClient": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "redirectUris": [
            "http://tenant-*.127.0.0.1.nip.io:8080/*",
            "http://tenant-*.127.0.0.1.nip.io:8080",
            "http://localhost:5173/*",
            "http://localhost:3000/*"
          ],
          "secret": "dnd-notes-tenant-app-secret-k3d-dev-only",
          "attributes": {
            "client.secret.rotated.on": "2025-04-01T00:00:00.000Z"
          }
        },
        {
          "clientId": "dnd-notes-control-plane",
          "enabled": true,
          "publicClient": false,
          "standardFlowEnabled": false,
          "bearerOnlyClient": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "secret": "dnd-notes-control-plane-secret-k3d-dev-only",
          "roles": {
            "client": [
              {
                "name": "admin"
              }
            ]
          }
        }
      ]
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-keycloak-bootstrap-env
  namespace: dnd-notes-platform
  annotations:
    dnd-notes.dev/warning: Development-only bootstrap credentials. Never reuse outside local k3d.
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: admin
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: platform-keycloak
    app.kubernetes.io/part-of: dnd-notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-keycloak
        app.kubernetes.io/part-of: dnd-notes
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2.4
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
            - --import-realm
            - --http-port=8080
            - --proxy-headers=xforwarded
          envFrom:
            - secretRef:
                name: platform-keycloak-bootstrap-env
          env:
            - name: KC_HOSTNAME
              value: http://keycloak.127.0.0.1.nip.io:8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-import
          configMap:
            name: platform-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: platform-keycloak
    app.kubernetes.io/part-of: dnd-notes
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: platform-keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-keycloak
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: platform-keycloak
    app.kubernetes.io/part-of: dnd-notes
spec:
  ingressClassName: nginx
  rules:
    - host: keycloak.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-keycloak
                port:
                  name: http
