apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-control-plane-secrets
  namespace: dnd-notes-platform
  labels:
    app.kubernetes.io/name: dnd-notes-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: dnd-notes
  annotations:
    dnd-notes.dev/template: replace-before-apply
type: Opaque
stringData:
  CONTROL_PLANE_ADMIN_TOKEN: replace-me
  TENANT_DATABASE_ADMIN_URL: replace-with-managed-admin-url
  TENANT_DATABASE_RUNTIME_URL: replace-with-managed-runtime-template-url
