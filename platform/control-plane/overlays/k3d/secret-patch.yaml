apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-control-plane-secrets
  namespace: dnd-notes-platform
# Intentionally keep placeholders in source control. Create or replace the real
# local secret after apply, for example with:
# kubectl create secret generic dnd-notes-control-plane-secrets \
#   -n dnd-notes-platform \
#   --from-literal=CONTROL_PLANE_ADMIN_TOKEN='replace-with-local-token' \
#   --from-literal=CONTROL_PLANE_DATABASE_URL='postgresql://postgres:postgres@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/control_plane' \
#   --from-literal=TENANT_DATABASE_ADMIN_URL='postgresql://postgres:postgres@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/postgres' \
#   --from-literal=TENANT_DATABASE_RUNTIME_URL='postgresql://runtime-template:placeholder@platform-postgres.dnd-notes-platform.svc.cluster.local:5432/postgres?sslmode=disable' \
#   --dry-run=client -o yaml | kubectl apply -f -
stringData:
  CONTROL_PLANE_ADMIN_TOKEN: replace-with-local-token
  CONTROL_PLANE_DATABASE_URL: replace-with-control-plane-postgres-url
  TENANT_DATABASE_ADMIN_URL: replace-with-local-admin-url
  TENANT_DATABASE_RUNTIME_URL: replace-with-local-runtime-template-url
  KEYCLOAK_ADMIN_CLIENT_ID: dnd-notes-keycloak-admin
  KEYCLOAK_ADMIN_CLIENT_SECRET: dev-admin-client-secret
