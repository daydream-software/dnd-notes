apiVersion: v1
kind: ConfigMap
metadata:
  name: dnd-notes-control-plane-config
  namespace: dnd-notes-platform
data:
  TENANT_BASE_DOMAIN: 127.0.0.1.nip.io
  TENANT_PUBLIC_SCHEME: http
  # Keycloak runtime auth configuration (k3d local)
  KEYCLOAK_URL: http://keycloak.127.0.0.1.nip.io:8080
  KEYCLOAK_REALM: dnd-notes-dev
  KEYCLOAK_TENANT_CLIENT_ID: dnd-notes-tenant-app
  KEYCLOAK_CONTROL_PLANE_CLIENT_ID: dnd-notes-control-plane
  # Auth mode: local (legacy email/password) or keycloak (OIDC/JWT)
  # When local: guest/share-link and session tokens work as before
  # When keycloak: requires KEYCLOAK_* secrets to be populated
  AUTH_MODE: keycloak
