apiVersion: v1
kind: ConfigMap
metadata:
  name: dnd-notes-control-plane-config
  namespace: dnd-notes-platform
data:
  TENANT_BASE_DOMAIN: tenants.example.com
  TENANT_PUBLIC_SCHEME: https
  # Keycloak runtime auth configuration (managed/hosted)
  KEYCLOAK_URL: https://auth.example.com
  KEYCLOAK_REALM: dnd-notes-prod
  KEYCLOAK_TENANT_CLIENT_ID: dnd-notes-tenant-app
  KEYCLOAK_CONTROL_PLANE_CLIENT_ID: dnd-notes-control-plane
  # Auth mode: local (legacy email/password) or keycloak (OIDC/JWT)
  AUTH_MODE: keycloak
