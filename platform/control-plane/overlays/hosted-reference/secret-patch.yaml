apiVersion: v1
kind: Secret
metadata:
  name: dnd-notes-control-plane-secrets
  namespace: dnd-notes-platform
stringData:
  CONTROL_PLANE_ADMIN_TOKEN: replace-with-managed-secret
  TENANT_DATABASE_ADMIN_URL: replace-with-managed-admin-url
  TENANT_DATABASE_RUNTIME_URL: replace-with-managed-runtime-template-url
  # Keycloak client secrets (managed environment)
  KEYCLOAK_TENANT_CLIENT_SECRET: replace-with-keycloak-tenant-client-secret
  KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET: replace-with-keycloak-control-plane-client-secret
